<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Opencode Studio</title>
    <style>
      body, html {
        margin: 0;
        padding: 0;
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      }
      #root {
        height: 100%;
      }
      
      /* Markdown Styling Overrides for Chat */
      .markdown-body {
        font-family: inherit;
        line-height: 1.5;
      }
      .markdown-body p:last-child {
        margin-bottom: 0;
      }
      .markdown-body p {
        margin-top: 0;
        margin-bottom: 8px;
      }
      .markdown-body pre {
        background-color: rgba(0, 0, 0, 0.2);
        padding: 8px 12px;
        border-radius: 6px;
        overflow-x: auto;
        margin: 8px 0;
      }
      .markdown-body code {
        background-color: rgba(0, 0, 0, 0.2);
        padding: 2px 4px;
        border-radius: 4px;
        font-family: monospace;
      }
      .markdown-body pre code {
        background-color: transparent;
        padding: 0;
      }
      .markdown-body a {
        color: #1677ff;
      }
      .markdown-body ul, .markdown-body ol {
        margin-top: 0;
        margin-bottom: 8px;
        padding-left: 20px;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
